    "cot-cm-external-ramp-tian-2015": {"method": "describing-function", "source": "Tian et al., IEEE TPEL 2016 (early access 2015)", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"]},
    "rbcot-esr-lu-2023": {"method": "describing-function", "source": "Lu et al., IEEE TPEL 2023", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"]},
    "v2-cot-li-lee-2009": {"method": "describing-function", "source": "Li and Lee, IEEE ECCE 2009", "interface": "direct-transfer", "supported_targets": ["Gvc"]}
  },
  "formulas": {
    "common.adapter.a-c": {"source_model_id": "common-current-source-adapter", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "(s*L+rL)*({Fc})/Vg", "parameters": ["s", "L", "rL", "Vg", "Fc"], "dimension_signature": "1/control", "numeric_probe_values": {"s": 1100, "L": 3e-7, "rL": 0.001, "Vg": 12, "Fc": 100}, "source_equation": "Buck inductor-port adapter", "approximation": "derived-adapter"},
    "common.adapter.a-g": {"source_model_id": "common-current-source-adapter", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "((s*L+rL)*({Fg})-D)/Vg", "parameters": ["s", "L", "rL", "D", "Vg", "Fg"], "dimension_signature": "1/voltage", "numeric_probe_values": {"s": 1100, "L": 3e-7, "rL": 0.001, "D": 0.1, "Vg": 12, "Fg": 0.1}, "source_equation": "Buck inductor-port adapter", "approximation": "derived-adapter"},
    "common.adapter.a-o": {"source_model_id": "common-current-source-adapter", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "((s*L+rL)*({Fo})+1)/Vg", "parameters": ["s", "L", "rL", "Vg", "Fo"], "dimension_signature": "1/voltage", "numeric_probe_values": {"s": 1100, "L": 3e-7, "rL": 0.001, "Vg": 12, "Fo": -0.1}, "source_equation": "Buck inductor-port adapter", "approximation": "derived-adapter"},
    "common.adapter.a-i": {"source_model_id": "common-current-source-adapter", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "0", "parameters": [], "dimension_signature": "1/current", "numeric_probe_values": {}, "source_equation": "Buck inductor-port adapter", "approximation": "derived-adapter"},
    "common.zero.a-g": {"source_model_id": "common-zero-path", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "0", "parameters": [], "dimension_signature": "1/voltage", "numeric_probe_values": {}, "source_equation": "Registered absent input path", "approximation": "exact-zero"},

    "li-lee-2010.fc-exact": {"source_model_id": "cot-cm-li-lee-2010", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "(fs/sf)*(1-exp(-s*Ton))*Vg/(L*s)", "parameters": ["fs", "sf", "s", "Ton", "Vg", "L"], "dimension_signature": "current/control", "numeric_probe_values": {"fs": 300000, "sf": 40000, "s": 1100, "Ton": 3.3e-7, "Vg": 12, "L": 3e-7}, "source_equation": "Li-Lee-2010-Eq9", "approximation": "exact-exponential"},
    "li-lee-2010.fc-pade": {"source_model_id": "cot-cm-li-lee-2010", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "1/(Ri*(1+s/(Q1*w1)+s**2/w1**2))", "parameters": ["Ri", "s", "Q1", "w1"], "dimension_signature": "current/control", "numeric_probe_values": {"Ri": 0.01, "s": 1100, "Q1": 0.6366197724, "w1": 9424777.96}, "source_equation": "Li-Lee-2010-Eq10", "approximation": "paper-pade"},
    "li-lee-2010.k1": {"source_model_id": "cot-cm-li-lee-2010", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "Ton*Ri/(2*L)", "parameters": ["Ton", "Ri", "L"], "dimension_signature": "current/voltage", "numeric_probe_values": {"Ton": 3.3e-7, "Ri": 0.01, "L": 3e-7}, "source_equation": "Li-Lee-2010-Eq14", "approximation": "paper-low-order"},
    "li-lee-2010.k2": {"source_model_id": "cot-cm-li-lee-2010", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "-Ton*Ri/(2*L)", "parameters": ["Ton", "Ri", "L"], "dimension_signature": "current/voltage", "numeric_probe_values": {"Ton": 3.3e-7, "Ri": 0.01, "L": 3e-7}, "source_equation": "Li-Lee-2010-Eq15", "approximation": "paper-low-order"},
    "li-lee-2010.fg": {"source_model_id": "cot-cm-li-lee-2010", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "({k1})*({Fc})", "parameters": ["k1", "Fc"], "dimension_signature": "current/voltage", "numeric_probe_values": {"k1": 0.0055, "Fc": 100}, "source_equation": "Li-Lee-2010-Eq14-adapter", "approximation": "paper-low-order"},
    "li-lee-2010.fo": {"source_model_id": "cot-cm-li-lee-2010", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "({k2})*({Fc})", "parameters": ["k2", "Fc"], "dimension_signature": "current/voltage", "numeric_probe_values": {"k2": -0.0055, "Fc": 100}, "source_equation": "Li-Lee-2010-Eq15-adapter", "approximation": "paper-low-order"},

    "tian-2015.a": {"source_model_id": "cot-cm-external-ramp-tian-2015", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "((sf+se)-se*exp(-s*Tsw))", "parameters": ["sf", "se", "s", "Tsw"], "dimension_signature": "slope", "numeric_probe_values": {"sf": 40000, "se": 40000, "s": 1100, "Tsw": 3.3e-6}, "source_equation": "Tian-2015-Eq4-denominator", "approximation": "exact-exponential"},
    "tian-2015.fc": {"source_model_id": "cot-cm-external-ramp-tian-2015", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "fs*(1-exp(-s*Ton))*Vg/(L*s*({A}))", "parameters": ["fs", "s", "Ton", "Vg", "L", "A"], "dimension_signature": "current/control", "numeric_probe_values": {"fs": 300000, "s": 1100, "Ton": 3.3e-7, "Vg": 12, "L": 3e-7, "A": 40000}, "source_equation": "Tian-2015-Eq4", "approximation": "exact-exponential"},
    "tian-2015.fg": {"source_model_id": "cot-cm-external-ramp-tian-2015", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "-1/(L*s)*(fs*(1-exp(-s*Ton))/((1-exp(s*Tsw))*({A}))*((1-exp(s*Ton))/(s*L/Ri))*Vg+D)", "parameters": ["L", "s", "fs", "Ton", "Tsw", "A", "Ri", "Vg", "D"], "dimension_signature": "current/voltage", "numeric_probe_values": {"L": 3e-7, "s": 1100, "fs": 300000, "Ton": 3.3e-7, "Tsw": 3.3e-6, "A": 40000, "Ri": 0.01, "Vg": 12, "D": 0.1}, "source_equation": "Tian-2015-Eq6", "approximation": "exact-exponential"},
    "tian-2015.fo": {"source_model_id": "cot-cm-external-ramp-tian-2015", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "1/(L*s)*(fs*(1-exp(-s*Ton))/({A})*(1/(s*L/Ri))*Vg-1)", "parameters": ["L", "s", "fs", "Ton", "A", "Ri", "Vg"], "dimension_signature": "current/voltage", "numeric_probe_values": {"L": 3e-7, "s": 1100, "fs": 300000, "Ton": 3.3e-7, "A": 40000, "Ri": 0.01, "Vg": 12}, "source_equation": "Tian-2015-Eq7", "approximation": "exact-exponential"},
    "tian-2015.fc-low": {"source_model_id": "cot-cm-external-ramp-tian-2015", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "(1/Ri)*(1+s*Tsw/2)/(1+(se/sf+1/2)*Tsw*s)", "parameters": ["Ri", "s", "Tsw", "se", "sf"], "dimension_signature": "current/control", "numeric_probe_values": {"Ri": 0.01, "s": 1100, "Tsw": 3.3e-6, "se": 40000, "sf": 40000}, "source_equation": "Tian-2015-Eq8", "approximation": "paper-low-order"},

    "lu-2023.delay-exact": {"source_model_id": "rbcot-esr-lu-2023", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "exp(-s*Tsw)", "parameters": ["s", "Tsw"], "dimension_signature": "dimensionless", "numeric_probe_values": {"s": 1100, "Tsw": 2.5e-6}, "source_equation": "Lu-2023-delay", "approximation": "exact-exponential"},
    "lu-2023.delay-pade": {"source_model_id": "rbcot-esr-lu-2023", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "1-s*Tsw/(1+s*Tsw/2+s**2*Tsw**2/pi**2)", "parameters": ["s", "Tsw"], "dimension_signature": "dimensionless", "numeric_probe_values": {"s": 1100, "Tsw": 2.5e-6}, "source_equation": "Lu-2023-after-Eq11", "approximation": "paper-pade"},
    "lu-2023.one-minus-delay": {"source_model_id": "rbcot-esr-lu-2023", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "1-({delay})", "parameters": ["delay"], "dimension_signature": "dimensionless", "numeric_probe_values": {"delay": 0.997}, "source_equation": "Lu-2023-delay-factor", "approximation": "bound-form"},
    "lu-2023.b": {"source_model_id": "rbcot-esr-lu-2023", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "Tsw/(rC*C)+(1+(Toff-2*Tsw)/(2*rC*C))*({one_minus_delay})", "parameters": ["Tsw", "rC", "C", "Toff", "one_minus_delay"], "dimension_signature": "dimensionless", "numeric_probe_values": {"Tsw": 2.5e-6, "rC": 0.0032, "C": 0.00448, "Toff": 2.25e-6, "one_minus_delay": 0.003}, "source_equation": "Lu-2023-Eq2-denominator", "approximation": "bound-form"},
    "lu-2023.fdx": {"source_model_id": "rbcot-esr-lu-2023", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "(fs/sf)*(1-exp(-s*Ton))*({one_minus_delay})*(1+rC/R)/({B})", "parameters": ["fs", "sf", "s", "Ton", "one_minus_delay", "rC", "R", "B"], "dimension_signature": "duty/control", "numeric_probe_values": {"fs": 400000, "sf": 12800, "s": 1100, "Ton": 2.5e-7, "one_minus_delay": 0.003, "rC": 0.0032, "R": 0.1, "B": 0.4}, "source_equation": "Lu-2023-Eq5", "approximation": "bound-delay"},
    "lu-2023.fodx": {"source_model_id": "rbcot-esr-lu-2023", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "(fs/sf)*(1-exp(-s*Ton))*({one_minus_delay})*(1/(s**2*L*C)+(rC/L+1/(R*C))/s)/({B})", "parameters": ["fs", "sf", "s", "Ton", "one_minus_delay", "L", "C", "rC", "R", "B"], "dimension_signature": "duty/output", "numeric_probe_values": {"fs": 400000, "sf": 12800, "s": 1100, "Ton": 2.5e-7, "one_minus_delay": 0.003, "L": 3e-7, "C": 0.00448, "rC": 0.0032, "R": 0.1, "B": 0.4}, "source_equation": "Lu-2023-Eq8", "approximation": "bound-delay"},
    "lu-2023.fox": {"source_model_id": "rbcot-esr-lu-2023", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "-({Fodx})-({Fdx})", "parameters": ["Fodx", "Fdx"], "dimension_signature": "duty/output", "numeric_probe_values": {"Fodx": 0.2, "Fdx": 0.3}, "source_equation": "Lu-2023-Eq9", "approximation": "paper-equation"},
    "lu-2023.fp": {"source_model_id": "rbcot-esr-lu-2023", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "Vg*(1+s*rC*C)/(1+s*(rC*C+L/R)+s**2*L*C*(1+rC/R))", "parameters": ["Vg", "s", "rC", "C", "L", "R"], "dimension_signature": "output/duty", "numeric_probe_values": {"Vg": 12, "s": 1100, "rC": 0.0032, "C": 0.00448, "L": 3e-7, "R": 0.1}, "source_equation": "Lu-2023-Eq10", "approximation": "paper-equation"},
    "lu-2023.floop": {"source_model_id": "rbcot-esr-lu-2023", "interface": "a-star", "supported_targets": ["Gvc"], "canonical_sympy_expr": "Fdx*Fp/(1+Fox*Fp)", "parameters": ["Fdx", "Fp", "Fox"], "dimension_signature": "output/control", "numeric_probe_values": {"Fdx": 0.3, "Fp": 12, "Fox": -0.5}, "source_equation": "Lu-2023-Eq11", "approximation": "paper-equation"},
    "lu-2023.a-o": {"source_model_id": "rbcot-esr-lu-2023", "interface": "a-star", "supported_targets": ["Gvc", "Gvg", "Zout"], "canonical_sympy_expr": "-({Fox})", "parameters": ["Fox"], "dimension_signature": "duty/output", "numeric_probe_values": {"Fox": -0.5}, "source_equation": "Lu-2023-Fig7-sign-adapter", "approximation": "derived-adapter"},

    "li-lee-2009.w1": {"source_model_id": "v2-cot-li-lee-2009", "interface": "direct-transfer", "supported_targets": ["Gvc"], "canonical_sympy_expr": "pi/Ton", "parameters": ["Ton"], "dimension_signature": "frequency", "numeric_probe_values": {"Ton": 3.3e-7}, "source_equation": "Li-Lee-2009-Eq8", "approximation": "paper-pade"},
    "li-lee-2009.q1": {"source_model_id": "v2-cot-li-lee-2009", "interface": "direct-transfer", "supported_targets": ["Gvc"], "canonical_sympy_expr": "2/pi", "parameters": [], "dimension_signature": "dimensionless", "numeric_probe_values": {}, "source_equation": "Li-Lee-2009-Eq8", "approximation": "paper-pade"},
    "li-lee-2009.w2": {"source_model_id": "v2-cot-li-lee-2009", "interface": "direct-transfer", "supported_targets": ["Gvc"], "canonical_sympy_expr": "pi/Tsw", "parameters": ["Tsw"], "dimension_signature": "frequency", "numeric_probe_values": {"Tsw": 3.3e-6}, "source_equation": "Li-Lee-2009-Eq9", "approximation": "paper-pade"},
    "li-lee-2009.q2": {"source_model_id": "v2-cot-li-lee-2009", "interface": "direct-transfer", "supported_targets": ["Gvc"], "canonical_sympy_expr": "Tsw/(pi*(rC*C-Ton/2))", "parameters": ["Tsw", "rC", "C", "Ton"], "dimension_signature": "dimensionless", "numeric_probe_values": {"Tsw": 3.333333333333e-6, "rC": 0.006, "C": 0.00056, "Ton": 3.333333333333e-7}, "source_equation": "Li-Lee-2009-Eq9", "approximation": "paper-pade"},
    "li-lee-2009.high-pair": {"source_model_id": "v2-cot-li-lee-2009", "interface": "direct-transfer", "supported_targets": ["Gvc"], "canonical_sympy_expr": "1+s/(Q1*w1)+s**2/w1**2", "parameters": ["s", "Q1", "w1"], "dimension_signature": "dimensionless", "numeric_probe_values": {"s": 1100, "Q1": 0.6366197724, "w1": 9424777.96}, "source_equation": "Li-Lee-2009-Eq8", "approximation": "paper-pade"},
    "li-lee-2009.fs-pair": {"source_model_id": "v2-cot-li-lee-2009", "interface": "direct-transfer", "supported_targets": ["Gvc"], "canonical_sympy_expr": "1+s/(Q2*w2)+s**2/w2**2", "parameters": ["s", "Q2", "w2"], "dimension_signature": "dimensionless", "numeric_probe_values": {"s": 1100, "Q2": 0.35, "w2": 942477.796}, "source_equation": "Li-Lee-2009-Eq9", "approximation": "paper-pade"},
    "li-lee-2009.gvc-pade": {"source_model_id": "v2-cot-li-lee-2009", "interface": "direct-transfer", "supported_targets": ["Gvc"], "canonical_sympy_expr": "(1+s*rC*C)/(({high_pair})*({fs_pair}))", "parameters": ["s", "rC", "C", "high_pair", "fs_pair"], "dimension_signature": "output/control", "numeric_probe_values": {"s": 1100, "rC": 0.006, "C": 0.00056, "high_pair": 1.001, "fs_pair": 1.01}, "source_equation": "Li-Lee-2009-Eq9", "approximation": "paper-pade"},
    "li-lee-2009.gvc-low-order": {"source_model_id": "v2-cot-li-lee-2009", "interface": "direct-transfer", "supported_targets": ["Gvc"], "canonical_sympy_expr": "(1+s*rC*C)/({fs_pair})", "parameters": ["s", "rC", "C", "fs_pair"], "dimension_signature": "output/control", "numeric_probe_values": {"s": 1100, "rC": 0.006, "C": 0.00056, "fs_pair": 1.01}, "source_equation": "Li-Lee-2009-Eq10", "approximation": "paper-low-order"}
  }
}
